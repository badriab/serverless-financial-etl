name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install black flake8 isort pytest pytest-cov

      - name: Lint
        run: |
          black --check . || true
          flake8 . --max-line-length=100 --exclude=.venv,cdk.out || true
          isort --check . || true

      - name: Test
        run: |
          pytest tests/ -v --tb=short || true
