name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]


jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2    # was @v4

      - name: Set up Python
        uses: actions/setup-python@v5.4.0  # was @v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov pandas numpy moto[s3] boto3 pyarrow requests psycopg2-binary

      - name: Lint
        run: |
          pip install black flake8 isort
          black --check . --exclude=".venv|cdk.out" || true
          flake8 . --max-line-length=100 --exclude=.venv,cdk.out,__pycache__ || true

      - name: Test with coverage
        run: |
          pytest tests/ -v \
            --cov=lambdas \
            --cov-report=term-missing \
            --cov-fail-under=50
      
      